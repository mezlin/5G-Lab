apiVersion: v1
kind: Namespace
metadata:
  name: ric

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: e2network
  namespace: ric
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ovs-cni.network.kubevirt.io/e2br
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "ovs",
      "bridge": "e2br",
      "mtu": 1450,
      "ipam": {
        "type": "static"
      }
    }'
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: a1network
  namespace: ric
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ovs-cni.network.kubevirt.io/a1br
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "ovs",
      "bridge": "a1br",
      "mtu": 1450,
      "ipam": {
        "type": "static"
      }
    }'

