apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: open5gs
  name: gnb-scaler-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  resourceNames: ["srsran-gnb"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gnb-scaler-binding
  namespace: open5gs
subjects:
- kind: ServiceAccount
  name: default
  namespace: nonrt-ric
roleRef:
  kind: Role
  name: gnb-scaler-role
  apiGroup: rbac.authorization.k8s.io
